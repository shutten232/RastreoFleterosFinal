<body>

<script>
window.addEventListener('load',function(){
const h=React.createElement;
const {useState,useEffect,useRef}=React;

firebase.initializeApp({
  apiKey:"AIzaSyDBpTLWkYT5jxW71o6gJjQYCiG-zYlTKMA",
  authDomain:"retirodefinitivofleteros.firebaseapp.com",
  projectId:"retirodefinitivofleteros",
  storageBucket:"retirodefinitivofleteros.firebasestorage.app",
  messagingSenderId:"109493302154",
  appId:"1:109493302154:web:ec1c4be9b9e9973f34ce73"
});
const db=firebase.firestore();

const FL=[
  {id:'jorge',    nombre:'Jorge',    color:'#00c896'},
  {id:'jorgejr',  nombre:'Jorge Jr', color:'#3b82f6'},
  {id:'jonathan', nombre:'Jonathan', color:'#f59e0b'},
];
const CBA=[-31.4167,-64.1833];

// ── NATIVE GPS BRIDGE ─────────────────────────────────────────────────────────
function isNative(){return window.Capacitor&&window.Capacitor.isNativePlatform();}

async function startNativeGps(fleteroId,fleteroNombre){
  const plugin=window.Capacitor&&Capacitor.Plugins&&Capacitor.Plugins.GpsPlugin;
  if(!plugin)throw new Error('Plugin no disponible');
  await plugin.startTracking({fleteroId,fleteroNombre});
}

async function stopNativeGps(){
  const plugin=window.Capacitor&&Capacitor.Plugins&&Capacitor.Plugins.GpsPlugin;
  if(!plugin)return;
  await plugin.stopTracking({});
}

function geoErrorText(err){
  if(!err)return 'No se pudo leer el GPS';
  if(err.code===1)return 'Permiso de ubicación denegado. Activá Ubicación para este sitio/app.';
  if(err.code===2)return 'El celular no pudo calcular la ubicación. Activá GPS/Alta precisión.';
  if(err.code===3)return 'El GPS tardó demasiado. Salí al exterior o esperá unos segundos y probá otra vez.';
  return err.message||'Error de GPS';
}

function ahoraAR(){
  return new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

// ── ESTILOS ───────────────────────────────────────────────────────────────────
const page={minHeight:'100dvh',background:'#0f1c2e',color:'#f0f4f8',display:'flex',flexDirection:'column'};
const cardBtn={background:'#1e3148',border:'1px solid rgba(255,255,255,0.08)',borderRadius:20,padding:'18px 20px',cursor:'pointer',display:'flex',alignItems:'center',gap:16,textAlign:'left',width:'100%'};

// ══════════════════════════════════════════════════════════════════════════════
// INICIO
// ══════════════════════════════════════════════════════════════════════════════
function Inicio({onSelect}){
  return h('div',{style:{...page,alignItems:'center',justifyContent:'center',padding:24}},
    h('div',{style:{textAlign:'center',marginBottom:44}},
      h('div',{style:{display:'inline-flex',alignItems:'center',gap:10,background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:16,padding:'10px 20px',marginBottom:18}},
        h('div',{style:{width:36,height:36,borderRadius:10,background:'linear-gradient(135deg,#00c896,#0ea5e9)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,fontWeight:900,color:'white'}},'Q'),
        h('div',null,
          h('div',{style:{fontSize:15,fontWeight:700,color:'#f0f4f8',letterSpacing:'0.5px'}},'QUIRGROUP'),
          h('div',{style:{fontSize:10,color:'#94a3b8',letterSpacing:'1px'}},'LOGÍSTICA')
        )
      ),
      h('div',{style:{fontSize:42,marginBottom:8}},'🚛'),
      h('div',{style:{fontSize:26,fontWeight:700,color:'#00c896'}},'FleteRuta'),
      h('div',{style:{fontSize:13,color:'#94a3b8',marginTop:6}},'GPS en tiempo real')
    ),
    h('div',{style:{display:'flex',flexDirection:'column',gap:12,width:'100%',maxWidth:320}},
      h('button',{onClick:()=>onSelect('oficina'),style:{...cardBtn,border:'1px solid rgba(0,200,150,0.25)'}},
        h('span',{style:{fontSize:36}},'🏢'),
        h('div',null,
          h('div',{style:{fontSize:16,fontWeight:700,color:'#f0f4f8'}},'Ver mapa'),
          h('div',{style:{fontSize:12,color:'#94a3b8',marginTop:3}},'Los 3 fleteros en vivo')
        )
      ),
      ...FL.map(f=>
        h('button',{key:f.id,onClick:()=>onSelect(f),style:{...cardBtn,border:`1px solid ${f.color}35`}},
          h('div',{style:{width:46,height:46,borderRadius:'50%',background:`${f.color}18`,border:`2.5px solid ${f.color}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,fontWeight:700,color:f.color,flexShrink:0}},f.nombre.slice(0,2).toUpperCase()),
          h('div',{style:{flex:1}},
            h('div',{style:{fontSize:16,fontWeight:700,color:'#f0f4f8'}},f.nombre),
            h('div',{style:{fontSize:12,color:'#94a3b8',marginTop:3}},'Activar mi GPS')
          ),
          h('div',{style:{width:10,height:10,borderRadius:'50%',background:f.color,opacity:0.4,flexShrink:0}})
        )
      )
    )
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// MAPA OFICINA
// ══════════════════════════════════════════════════════════════════════════════
function MapaOficina({onBack}){
  const mapDiv=useRef(null),mapRef=useRef(null),mkrs=useRef({});
  const [estados,setEstados]=useState({});
  const lastSeen=useRef({});

  useEffect(()=>{
    const map=L.map(mapDiv.current,{zoomControl:false}).setView(CBA,13);
    mapRef.current=map;
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(map);
    L.control.zoom({position:'bottomright'}).addTo(map);

    // Crear iconos una sola vez
    const iconos={};
    FL.forEach(f=>{
      iconos[f.id]=L.divIcon({className:'',
        html:`<div style="position:relative;width:44px;height:44px;display:flex;align-items:center;justify-content:center">
          <div style="position:absolute;width:44px;height:44px;border-radius:50%;background:${f.color};animation:ripple 2s ease-out infinite;opacity:0.3"></div>
          <div style="width:34px;height:34px;border-radius:50%;background:${f.color};border:3px solid white;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white;box-shadow:0 2px 12px rgba(0,0,0,0.5);position:relative;z-index:1;font-family:sans-serif">${f.nombre.slice(0,2).toUpperCase()}</div>
        </div>`,
        iconSize:[44,44],iconAnchor:[22,22]});
    });

    // Escuchar Firebase en tiempo real
    const unsub=db.collection('posiciones').onSnapshot(snap=>{
      const est={};
      snap.forEach(doc=>{
        const d=doc.data(),f=FL.find(x=>x.id===doc.id);
        if(!f||typeof d.lat!=='number'||typeof d.lng!=='number')return;
        // No borrar al instante: en celulares el GPS puede mandar cada varios segundos.
        // updatedAtMs evita que el serverTimestamp llegue nulo en el primer segundo.
        const t=d.updatedAtMs||(d.ts&&d.ts.seconds?d.ts.seconds*1000:Date.now());
        if(Date.now()-t>120000)return;
        lastSeen.current[doc.id]=t;
        est[doc.id]=true;
        if(mkrs.current[doc.id]){
          mkrs.current[doc.id].setLatLng([d.lat,d.lng]);
        }else{
          mkrs.current[doc.id]=L.marker([d.lat,d.lng],{icon:iconos[doc.id],zIndexOffset:1000})
            .addTo(map).bindPopup(`<b>🚐 ${f.nombre}</b>`);
        }
      });
      setEstados(e=>({...e,...est}));
    });

    // Limpiar markers sin señal cada 5 segundos
    const limpieza=setInterval(()=>{
      const ahora=Date.now();
      Object.keys(mkrs.current).forEach(id=>{
        if(ahora-(lastSeen.current[id]||0)>120000){
          mkrs.current[id].remove();
          delete mkrs.current[id];
          setEstados(e=>{const n={...e};delete n[id];return n;});
        }
      });
    },5000);

    return()=>{unsub();clearInterval(limpieza);map.remove();mapRef.current=null;};
  },[]);

  function centrar(id){
    const m=mkrs.current[id];
    if(m&&mapRef.current)mapRef.current.setView(m.getLatLng(),17,{animate:true});
  }

  const activos=FL.filter(f=>estados[f.id]);

  return h('div',{style:{height:'100dvh',display:'flex',flexDirection:'column'}},
    h('div',{style:{background:'#162336',borderBottom:'1px solid rgba(255,255,255,0.08)',height:56,padding:'0 16px',display:'flex',alignItems:'center',gap:10,flexShrink:0}},
      h('button',{onClick:onBack,style:{background:'none',border:'none',color:'#94a3b8',fontSize:22,cursor:'pointer'}},'‹'),
      h('div',{style:{width:26,height:26,borderRadius:7,background:'linear-gradient(135deg,#00c896,#0ea5e9)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:900,color:'white'}},'Q'),
      h('span',{style:{fontSize:16,fontWeight:700,color:'#f0f4f8'}},'Mapa en vivo'),
      h('span',{style:{marginLeft:'auto',fontSize:12,color:activos.length>0?'#00c896':'#94a3b8'}},activos.length+' activo'+(activos.length!==1?'s':''))
    ),
    h('div',{style:{background:'#162336',borderBottom:'1px solid rgba(255,255,255,0.08)',padding:'8px 12px',display:'flex',gap:8,flexShrink:0}},
      ...FL.map(f=>{
        const activo=estados[f.id];
        const segs=lastSeen.current[f.id]?Math.round((Date.now()-lastSeen.current[f.id])/1000):null;
        const tiempo=activo&&segs!==null?(segs<3?'ahora':segs+'s'):null;
        return h('button',{key:f.id,onClick:()=>centrar(f.id),
          style:{padding:'7px 16px',borderRadius:20,border:`1.5px solid ${activo?f.color:'rgba(255,255,255,0.1)'}`,background:activo?`${f.color}18`:'transparent',color:activo?f.color:'#4a6080',fontSize:13,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:7,transition:'all .3s'}},
          h('span',{style:{width:8,height:8,borderRadius:'50%',background:activo?f.color:'#4a6080',display:'inline-block',animation:activo?'pulse 2s infinite':'none'}}),
          f.nombre,
          tiempo&&h('span',{style:{fontSize:10,opacity:0.7,fontWeight:400}},tiempo)
        );
      })
    ),
    h('div',{ref:mapDiv,style:{flex:1}}),
    activos.length===0&&h('div',{style:{position:'absolute',bottom:28,left:16,right:16,zIndex:100,background:'rgba(15,28,46,0.96)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:18,padding:'18px',textAlign:'center'}},
      h('div',{style:{fontSize:28,marginBottom:8}},'📡'),
      h('div',{style:{fontSize:14,fontWeight:700,color:'#f0f4f8'}},'Ningún fletero activo'),
      h('div',{style:{fontSize:12,color:'#94a3b8',marginTop:4}},'Cuando activen el GPS aparecen acá')
    )
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// PANTALLA FLETERO
// ══════════════════════════════════════════════════════════════════════════════
function PantallaFletero({fl,onBack}){
  const [gpsOn,setGpsOn]=useState(false);
  const [error,setError]=useState('');
  const [pos,setPos]=useState(null);
  const watchId=useRef(null);

  // Limpiar posición vieja al entrar y al salir
  useEffect(()=>{
    db.collection('posiciones').doc(fl.id).delete().catch(()=>{});
    return()=>{
      if(watchId.current!==null&&navigator.geolocation){
        navigator.geolocation.clearWatch(watchId.current);
        watchId.current=null;
      }
    };
  },[fl.id]);

  async function publicar(lat,lng,accuracy){
    const data={
      lat,lng,
      accuracy:accuracy||null,
      nombre:fl.nombre,
      fleteroId:fl.id,
      updatedAtMs:Date.now(),
      userAgent:navigator.userAgent,
      ts:firebase.firestore.FieldValue.serverTimestamp()
    };
    await db.collection('posiciones').doc(fl.id).set(data,{merge:true});
  }

  function iniciarGpsWeb(){
    if(!navigator.geolocation){setError('GPS no disponible en este celular/navegador');return;}

    if(watchId.current!==null){
      navigator.geolocation.clearWatch(watchId.current);
      watchId.current=null;
    }

    setGpsOn(true);
    setPos({hora:ahoraAR(),estado:'Buscando señal...'});

    // Primera lectura rápida. Sirve para que la oficina vea algo apenas activa.
    navigator.geolocation.getCurrentPosition(
      p=>{
        const lat=p.coords.latitude,lng=p.coords.longitude;
        setGpsOn(true);
        setPos({lat,lng,accuracy:Math.round(p.coords.accuracy||0),hora:ahoraAR(),estado:'Señal enviada'});
        publicar(lat,lng,p.coords.accuracy).catch(e=>setError('Firebase no recibió la ubicación: '+e.message));
      },
      err=>setError(geoErrorText(err)),
      {enableHighAccuracy:true,maximumAge:0,timeout:20000}
    );

    // Seguimiento continuo mientras la pantalla siga abierta.
    watchId.current=navigator.geolocation.watchPosition(
      p=>{
        const lat=p.coords.latitude,lng=p.coords.longitude;
        setGpsOn(true);
        setError('');
        setPos({lat,lng,accuracy:Math.round(p.coords.accuracy||0),hora:ahoraAR(),estado:'Señal enviada'});
        publicar(lat,lng,p.coords.accuracy).catch(e=>setError('Firebase no recibió la ubicación: '+e.message));
      },
      err=>setError(geoErrorText(err)),
      {enableHighAccuracy:true,maximumAge:5000,timeout:30000}
    );
  }

  async function activar(){
    setError('');

    // Si existe plugin nativo, lo intento. Igual activo fallback web para que no quede mudo.
    if(isNative()){
      try{
        await startNativeGps(fl.id,fl.nombre);
      }catch(e){
        console.warn('GPS nativo no disponible, uso GPS web',e);
      }
    }

    iniciarGpsWeb();
  }

  async function desactivar(){
    if(watchId.current!==null&&navigator.geolocation){
      navigator.geolocation.clearWatch(watchId.current);
      watchId.current=null;
    }
    if(isNative())await stopNativeGps().catch(()=>{});
    await db.collection('posiciones').doc(fl.id).delete().catch(()=>{});
    setGpsOn(false);setPos(null);setError('');
  }

  return h('div',{style:page},
    // Banner GPS activo
    gpsOn&&h('div',{style:{background:`${fl.color}15`,borderBottom:`1px solid ${fl.color}40`,padding:'8px 16px',display:'flex',alignItems:'center',gap:8}},
      h('span',{style:{width:8,height:8,borderRadius:'50%',background:fl.color,display:'inline-block',animation:'pulse 1.5s infinite'}}),
      h('span',{style:{fontSize:12,color:fl.color,fontWeight:600}},'GPS activo'),
      h('span',{style:{fontSize:11,color:'#94a3b8',marginLeft:'auto'}},'Mantené esta pantalla abierta')
    ),
    // Topbar
    h('div',{style:{background:'#162336',borderBottom:'1px solid rgba(255,255,255,0.08)',height:56,padding:'0 16px',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}},
      h('div',{style:{display:'flex',alignItems:'center',gap:10}},
        h('button',{onClick:onBack,style:{background:'none',border:'none',color:'#94a3b8',fontSize:22,cursor:'pointer'}},'‹'),
        h('div',{style:{width:34,height:34,borderRadius:'50%',background:`${fl.color}20`,border:`2px solid ${fl.color}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,color:fl.color}},fl.nombre.slice(0,2).toUpperCase()),
        h('span',{style:{fontSize:16,fontWeight:700,color:'#f0f4f8'}},fl.nombre)
      ),
      h('span',{style:{fontSize:11,padding:'3px 10px',borderRadius:20,background:gpsOn?`${fl.color}20`:'rgba(245,158,11,0.15)',color:gpsOn?fl.color:'#f59e0b',fontWeight:600}},gpsOn?'En línea':'Desconectado')
    ),
    // Cuerpo
    h('div',{style:{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:32,gap:28}},
      // Botón GPS
      h('div',{style:{position:'relative',width:160,height:160,display:'flex',alignItems:'center',justifyContent:'center'}},
        gpsOn&&h('div',{style:{position:'absolute',width:160,height:160,borderRadius:'50%',background:fl.color,animation:'ripple 2.5s ease-out infinite',opacity:0.2}}),
        gpsOn&&h('div',{style:{position:'absolute',width:160,height:160,borderRadius:'50%',background:fl.color,animation:'ripple 2.5s ease-out 1.2s infinite',opacity:0.15}}),
        h('button',{onClick:gpsOn?desactivar:activar,style:{
          width:150,height:150,borderRadius:'50%',
          border:`4px solid ${gpsOn?fl.color:'rgba(255,255,255,0.12)'}`,
          background:gpsOn?`${fl.color}15`:'rgba(255,255,255,0.03)',
          cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:8,
          position:'relative',zIndex:1,transition:'all .3s'
        }},
          h('span',{style:{fontSize:52}},gpsOn?'📍':'🔌'),
          h('span',{style:{fontSize:14,fontWeight:700,color:gpsOn?fl.color:'#94a3b8'}},gpsOn?'Activo':'Activar GPS')
        )
      ),
      // Info
      pos&&h('div',{style:{background:'#1e3148',border:`1px solid ${fl.color}30`,borderRadius:16,padding:'14px 20px',textAlign:'center',width:'100%',maxWidth:280}},
        h('div',{style:{fontSize:11,color:'#94a3b8',marginBottom:4}},pos.estado||'GPS activo'),
        h('div',{style:{fontSize:20,fontWeight:700,color:'#f0f4f8'}},pos.hora),
        pos.accuracy&&h('div',{style:{fontSize:11,color:'#94a3b8',marginTop:5}},'Precisión aprox. '+pos.accuracy+' m'),
        h('div',{style:{fontSize:12,color:fl.color,marginTop:6,fontWeight:600}},'✓ Señal enviada a la oficina')
      ),
      error&&h('div',{style:{background:'rgba(239,68,68,0.1)',border:'1px solid rgba(239,68,68,0.3)',borderRadius:12,padding:'14px 16px',fontSize:13,color:'#ef4444',textAlign:'center',maxWidth:300,lineHeight:1.6}},
        h('div',{style:{fontSize:20,marginBottom:8}},'⚠️'),
        error,
        h('br'),
        h('div',{style:{fontSize:11,color:'#94a3b8',marginTop:8}},'Configuración → Apps → FleteRuta → Permisos → Ubicación → Permitir todo el tiempo')
      ),
      !gpsOn&&!error&&h('div',{style:{fontSize:13,color:'#4a6080',textAlign:'center',maxWidth:260,lineHeight:1.7}},
        'Tocá el botón para activar el GPS.',
        h('br'),
        h('span',{style:{color:'#00c896',fontWeight:600}},'La oficina te ve en el mapa al instante.')
      )
    )
  );
}

// ROOT
function App(){
  const [p,setP]=useState('inicio');
  if(p==='inicio')return h(Inicio,{onSelect:x=>setP(x)});
  if(p==='oficina')return h(MapaOficina,{onBack:()=>setP('inicio')});
  return h(PantallaFletero,{fl:p,onBack:()=>setP('inicio')});
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
});
</script>
</body>
