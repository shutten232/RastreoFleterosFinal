// ── GEOCODE ───────────────────────────────────────────────────────────────────
async function geocode(dir){
  try{
    const q=encodeURIComponent(dir+', Córdoba, Argentina');
    const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1`,{headers:{'Accept-Language':'es'}});
    const d=await r.json();
    if(!d.length)return null;
    return{lat:parseFloat(d[0].lat),lng:parseFloat(d[0].lon)};
  }catch(e){return null;}
}

// ══════════════════════════════════════════════════════════════════════════════
function MapaRuta({paradas,pedidos,fleteroId,onClose}){
  const mapDiv=useRef(null),mapRef=useRef(null),gpsMarker=useRef(null),otrosM=useRef({}),watchRef=useRef(null),wakeLock=useRef(null);
  const [cargando,setCargando]=useState(true);
  const [coords,setCoords]=useState([]);
  const [gpsOn,setGpsOn]=useState(false);
  const [gpsErr,setGpsErr]=useState('');

  useEffect(()=>{
    let vivo=true;
    (async()=>{
      const res=[];
      for(let i=0;i<paradas.length;i++){
        const par=paradas[i],ped=pedidos.find(p=>p.id===par.pedidoId);
        if(!ped)continue;
        const c=await geocode(ped.direccion);
        if(c)res.push({...c,idx:i,status:par.status,dir:ped.direccion,cliente:ped.cliente});
        if(i<paradas.length-1)await new Promise(r=>setTimeout(r,350));
      }
      if(vivo){setCoords(res);setCargando(false);}
    })();
    return()=>{vivo=false};
  },[]);

  useEffect(()=>{
    if(cargando||!coords.length||mapRef.current)return;
    delete L.Icon.Default.prototype._getIconUrl;
    L.Icon.Default.mergeOptions({iconRetinaUrl:'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon-2x.png',iconUrl:'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',shadowUrl:'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png'});
    const map=L.map(mapDiv.current,{zoomControl:false}).setView([coords[0].lat,coords[0].lng],13);
    mapRef.current=map;
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(map);
    L.control.zoom({position:'bottomright'}).addTo(map);
    coords.forEach((c,i)=>{
      const col=c.status==='entregado'?C.accent:c.status==='problema'?C.danger:C.sky;
      const txt=c.status==='entregado'?'✓':c.status==='problema'?'!':String(c.idx+1);
      L.marker([c.lat,c.lng],{icon:L.divIcon({className:'',html:`<div style="width:34px;height:34px;border-radius:50% 50% 50% 0;background:${col};border:2.5px solid white;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;transform:rotate(-45deg);box-shadow:0 3px 10px rgba(0,0,0,0.5)"><span style="transform:rotate(45deg)">${txt}</span></div>`,iconSize:[34,34],iconAnchor:[17,34],popupAnchor:[0,-34]})}).addTo(map).bindPopup(`<b>${c.idx+1}. ${c.dir}</b><br><small>${c.cliente}</small>`);
    });
    if(coords.length>1){
      L.Routing.control({waypoints:coords.map(c=>L.latLng(c.lat,c.lng)),routeWhileDragging:false,show:false,addWaypoints:false,draggableWaypoints:false,fitSelectedRoutes:false,
        lineOptions:{styles:[{color:'#000',opacity:0.15,weight:9},{color:C.sky,opacity:0.9,weight:5}],extendToWaypoints:true,missingRouteTolerance:0},createMarker:()=>null}).addTo(map);
    }
    map.fitBounds(L.latLngBounds(coords.map(c=>[c.lat,c.lng])),{padding:[50,50]});
    return()=>{if(watchRef.current)navigator.geolocation.clearWatch(watchRef.current);if(wakeLock.current)wakeLock.current.release().catch(()=>{});map.remove();mapRef.current=null;};
  },[cargando,coords]);

  // Posiciones en tiempo real de todos los fleteros (visible en oficina y en el mapa de cada fletero)
  useEffect(()=>{
    if(cargando)return;
    const unsub=db.collection('posiciones').onSnapshot(snap=>{
      snap.forEach(doc=>{
        if(doc.id===fleteroId)return; // el propio fletero se muestra con GPS local
        const d=doc.data(),fl=FLETEROS.find(f=>f.id===doc.id);
        if(!fl||!mapRef.current)return;
        const icoHtml=`<div style="width:32px;height:32px;border-radius:50%;background:${C.warn};border:3px solid white;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#1a1000;box-shadow:0 2px 8px rgba(0,0,0,0.4)">${fl.avatar}</div>`;
        const ico=L.divIcon({className:'',html:icoHtml,iconSize:[32,32],iconAnchor:[16,16]});
        if(otrosM.current[doc.id])otrosM.current[doc.id].setLatLng([d.lat,d.lng]);
        else otrosM.current[doc.id]=L.marker([d.lat,d.lng],{icon:ico,zIndexOffset:900}).addTo(mapRef.current).bindPopup(`🚐 ${fl.nombre}`);
      });
    });
    return()=>unsub();
  },[cargando]);

  async function pedirWakeLock(){
    try{if('wakeLock' in navigator){wakeLock.current=await navigator.wakeLock.request('screen');document.addEventListener('visibilitychange',async()=>{if(document.visibilityState==='visible')try{wakeLock.current=await navigator.wakeLock.request('screen');}catch(e){}});}}catch(e){}
  }

  function activarGPS(){
    if(!navigator.geolocation){setGpsErr('GPS no disponible en este dispositivo');return;}
    setGpsOn(true);setGpsErr('');
    pedirWakeLock();
    watchRef.current=navigator.geolocation.watchPosition(pos=>{
      const{latitude:lat,longitude:lng}=pos.coords;
      const map=mapRef.current;if(!map)return;
      // Guardar posición en Firebase
      if(fleteroId)db.collection('posiciones').doc(fleteroId).set({lat,lng,ts:firebase.firestore.FieldValue.serverTimestamp()});
      const icoHtml=`<div style="width:26px;height:26px;border-radius:50%;background:${C.accent};border:3px solid white;box-shadow:0 0 0 8px ${C.accent}30;animation:glow 2s infinite"></div>`;
      if(!gpsMarker.current){
        gpsMarker.current=L.marker([lat,lng],{icon:L.divIcon({className:'',html:icoHtml,iconSize:[26,26],iconAnchor:[13,13]}),zIndexOffset:1000}).addTo(map);
        map.panTo([lat,lng],{animate:true});
      }else gpsMarker.current.setLatLng([lat,lng]);
    },err=>{
      if(err.code===1)setGpsErr('Permiso GPS denegado. Habilitalo en Configuración del navegador.');
      else if(err.code===2)setGpsErr('Sin señal GPS. ¿Estás en un lugar cerrado?');
      else{setGpsErr('GPS timeout, reintentando...');setTimeout(()=>{if(watchRef.current)navigator.geolocation.clearWatch(watchRef.current);activarGPS();},3000);}
      setGpsOn(false);
    },{enableHighAccuracy:true,maximumAge:3000,timeout:20000});
  }

  return React.createElement('div',{style:{position:'fixed',inset:0,background:C.bg,zIndex:200,display:'flex',flexDirection:'column'}},
    gpsOn&&React.createElement('div',{style:{background:`${C.accent}15`,borderBottom:`1px solid ${C.accent}40`,padding:'7px 16px',display:'flex',alignItems:'center',gap:8,flexShrink:0}},
      React.createElement('span',{style:{width:8,height:8,borderRadius:'50%',background:C.accent,display:'inline-block',animation:'pulse 1.5s infinite'}}),
      React.createElement('span',{style:{fontSize:12,color:C.accent,fontWeight:600}},'GPS activo · pantalla sin bloqueo'),
      React.createElement('span',{style:{fontSize:11,color:C.muted,marginLeft:'auto'}},'No cerrés la app')
    ),
    React.createElement('div',{style:TB},
      React.createElement('button',{onClick:onClose,style:{background:'none',border:'none',color:C.muted,fontSize:20,cursor:'pointer',padding:'0 8px 0 0'}},'‹ Volver'),
      React.createElement('span',{style:{fontSize:14,fontWeight:700,color:C.text}},'Mapa de ruta'),
      React.createElement('span',{style:{fontSize:12,color:C.muted}},coords.length+' paradas')
    ),
    cargando&&React.createElement('div',{style:{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14}},
      React.createElement('div',{style:{fontSize:40}},'🗺️'),
      React.createElement('div',{style:{fontSize:14,fontWeight:700,color:C.text}},'Buscando direcciones...'),
      React.createElement('div',{style:{fontSize:12,color:C.muted}},'Geocodificando '+paradas.length+' paradas')
    ),
    React.createElement('div',{ref:mapDiv,style:{flex:1,display:cargando?'none':'block'}}),
    !cargando&&React.createElement('div',{style:{position:'absolute',bottom:24,left:16,right:16,zIndex:210,display:'flex',flexDirection:'column',gap:10}},
      React.createElement('div',{style:{display:'flex',gap:10}},
        React.createElement('button',{onClick:activarGPS,disabled:gpsOn,style:{flex:1,padding:'13px',background:gpsOn?`${C.accent}20`:C.accent,color:gpsOn?C.accent:C.bg,border:gpsOn?`2px solid ${C.accent}`:'none',borderRadius:14,fontSize:14,fontWeight:700,cursor:gpsOn?'default':'pointer',boxShadow:'0 4px 20px rgba(0,0,0,0.4)'}},gpsOn?'🟢 GPS activo':'📍 Activar GPS'),
        React.createElement('button',{onClick:()=>window.open('https://www.google.com/maps/dir/'+coords.map(c=>c.lat+','+c.lng).join('/'),'_blank'),style:{flex:1,padding:'13px',background:C.sky,color:'white',border:'none',borderRadius:14,fontSize:14,fontWeight:700,cursor:'pointer',boxShadow:'0 4px 20px rgba(0,0,0,0.4)'}},'🧭 Abrir en Maps')
      ),
      gpsErr&&React.createElement('div',{style:{background:`${C.danger}15`,border:`1px solid ${C.danger}40`,borderRadius:12,padding:'8px 14px',fontSize:12,color:C.danger,textAlign:'center'}},gpsErr)
    )
  );
}

function Oficina({onBack}){
  const [tab,setTab]=useState('pedidos');
  const [pedidos,setPedidos]=useState([]);
  const [rutas,setRutas]=useState([]);
  const [form,setForm]=useState({direccion:'',cliente:'',bultos:1,obs:''});
  const [selP,setSelP]=useState([]);
  const [selF,setSelF]=useState('');
  const [verMapa,setVerMapa]=useState(null);

  useEffect(()=>{
    const u=db.collection('pedidos').orderBy('creadoEn','desc').onSnapshot(s=>setPedidos(s.docs.map(d=>({id:d.id,...d.data()}))));
    return()=>u();
  },[]);

  useEffect(()=>{
    const hoy=new Date();hoy.setHours(0,0,0,0);
    const u=db.collection('rutas').where('fecha','>=',hoy).onSnapshot(s=>setRutas(s.docs.map(d=>({id:d.id,...d.data()}))));
    return()=>u();
  },[]);

  const pend=pedidos.filter(p=>p.status==='pendiente');
  const sc={pendiente:C.warn,asignado:C.sky,entregado:C.accent,problema:C.danger};

  async function addPedido(){
    if(!form.direccion.trim()||!form.cliente.trim())return;
    await db.collection('pedidos').add({...form,bultos:parseInt(form.bultos)||1,status:'pendiente',creadoEn:firebase.firestore.FieldValue.serverTimestamp()});
    setForm({direccion:'',cliente:'',bultos:1,obs:''});
  }

  async function crearRuta(){
    if(!selF||!selP.length)return;
    const batch=db.batch();
    const ref=db.collection('rutas').doc();
    batch.set(ref,{fleteroId:selF,fecha:new Date(),paradas:selP.map((pid,i)=>({pedidoId:pid,orden:i+1,status:'pendiente',nota:''}))});
    selP.forEach(pid=>batch.update(db.collection('pedidos').doc(pid),{status:'asignado'}));
    await batch.commit();
    setSelP([]);setSelF('');setTab('seguimiento');
  }

  const rutaMapa=rutas.find(r=>r.id===verMapa);

  return React.createElement('div',{style:A},
    verMapa&&rutaMapa&&React.createElement(MapaRuta,{paradas:rutaMapa.paradas,pedidos,fleteroId:null,onClose:()=>setVerMapa(null)}),
    React.createElement('div',{style:TB},
      React.createElement('div',{style:{display:'flex',alignItems:'center',gap:8}},
        React.createElement('button',{onClick:onBack,style:{background:'none',border:'none',color:C.muted,fontSize:22,cursor:'pointer'}},'‹'),
        React.createElement('span',{style:{fontSize:17,fontWeight:700,color:C.accent}},'FleteRuta')
      ),
      React.createElement('span',{style:{fontSize:12,color:C.muted}},'Oficina')
    ),
    React.createElement('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,padding:'12px 16px 0'}},
      ...[[pedidos.filter(p=>p.status==='pendiente').length,'Pendientes',C.warn],[pedidos.filter(p=>p.status==='asignado').length,'En ruta',C.sky],[pedidos.filter(p=>p.status==='entregado').length,'Entregados',C.accent]].map(([n,l,c])=>
        React.createElement('div',{key:l,style:{background:`${c}15`,border:`1px solid ${c}30`,borderRadius:12,padding:'10px 0',textAlign:'center'}},
          React.createElement('div',{style:{fontSize:22,fontWeight:700,color:c,lineHeight:1}},n),
          React.createElement('div',{style:{fontSize:10,color:C.muted,marginTop:3}},l)
        )
      )
    ),
    React.createElement('div',{style:{display:'flex',padding:'12px 16px 0',gap:4,overflowX:'auto',flexShrink:0}},
      ...[['pedidos','📦 Pedidos'],['ruta','🗺 Armar ruta'],['seguimiento','📡 Seguimiento']].map(([k,l])=>
        React.createElement('button',{key:k,onClick:()=>setTab(k),style:{padding:'8px 14px',borderRadius:10,border:'none',fontSize:12,fontWeight:600,cursor:'pointer',whiteSpace:'nowrap',background:tab===k?C.accent:'transparent',color:tab===k?C.bg:C.muted}},l)
      )
    ),
    React.createElement('div',{style:SC},
      // PEDIDOS
      tab==='pedidos'&&React.createElement(React.Fragment,null,
        React.createElement('div',{style:CD},
          React.createElement('div',{style:CT},'Nuevo pedido'),
          React.createElement('div',{style:R2},
            React.createElement('div',null,React.createElement('label',{style:LB},'Dirección'),React.createElement('input',{style:IN,value:form.direccion,onChange:e=>setForm({...form,direccion:e.target.value}),placeholder:'Av. Ejemplo 123'})),
            React.createElement('div',null,React.createElement('label',{style:LB},'Cliente'),React.createElement('input',{style:IN,value:form.cliente,onChange:e=>setForm({...form,cliente:e.target.value}),placeholder:'Apellido'}))
          ),
          React.createElement('div',{style:R2},
            React.createElement('div',null,React.createElement('label',{style:LB},'Bultos'),React.createElement('input',{style:IN,type:'number',min:1,value:form.bultos,onChange:e=>setForm({...form,bultos:e.target.value})})),
            React.createElement('div',null,React.createElement('label',{style:LB},'Obs.'),React.createElement('input',{style:IN,value:form.obs,onChange:e=>setForm({...form,obs:e.target.value}),placeholder:'Opcional'}))
          ),
          React.createElement('button',{style:BT(C.accent),onClick:addPedido},'+ Agregar pedido')
        ),
        React.createElement('div',{style:CD},
          React.createElement('div',{style:CT},'Lista ('+pedidos.length+')'),
          pedidos.length===0&&React.createElement('div',{style:{color:C.muted,fontSize:13,textAlign:'center',padding:20}},'Sin pedidos.'),
          ...pedidos.map((p,i)=>{
            const bc=sc[p.status]||C.muted;
            return React.createElement('div',{key:p.id,style:{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:i<pedidos.length-1?`1px solid ${C.border}`:'none'}},

// FLETERO
// ══════════════════════════════════════════════════════════════════════════════
function Fletero({onBack}){
  const [fleteroId,setFleteroId]=useState(null);
  const [pedidos,setPedidos]=useState([]);
  const [miRuta,setMiRuta]=useState(null);
  const [notaModal,setNotaModal]=useState(null);
  const [nota,setNota]=useState('');
  const [verMapa,setVerMapa]=useState(false);

  const fl=FLETEROS.find(f=>f.id===fleteroId);

  useEffect(()=>{
    if(!fleteroId)return;
    const u=db.collection('pedidos').onSnapshot(s=>setPedidos(s.docs.map(d=>({id:d.id,...d.data()}))));
    return()=>u();
  },[fleteroId]);

  useEffect(()=>{
    if(!fleteroId)return;
    const hoy=new Date();hoy.setHours(0,0,0,0);
    const u=db.collection('rutas').where('fleteroId','==',fleteroId).where('fecha','>=',hoy).onSnapshot(s=>{
      if(!s.empty)setMiRuta({id:s.docs[0].id,...s.docs[0].data()});
      else setMiRuta(null);
    });
    return()=>u();
  },[fleteroId]);

  const paradas=miRuta?.paradas||[];
  const done=paradas.filter(p=>p.status==='entregado').length;
  const prob=paradas.filter(p=>p.status==='problema').length;
  const pct=paradas.length?Math.round((done+prob)/paradas.length*100):0;
  const curIdx=paradas.findIndex(p=>p.status==='pendiente');

  async function markParada(pedidoId,status,notaTxt=''){
    const np=paradas.map(p=>p.pedidoId===pedidoId?{...p,status,nota:notaTxt}:p);
    await db.collection('rutas').doc(miRuta.id).update({paradas:np});
    await db.collection('pedidos').doc(pedidoId).update({status});
  }

  if(!fleteroId)return React.createElement('div',{style:{...A,alignItems:'center',justifyContent:'center',padding:24}},
    React.createElement('button',{onClick:onBack,style:{position:'absolute',top:16,left:16,background:'none',border:'none',color:C.muted,fontSize:22,cursor:'pointer'}},'‹ Volver'),
    React.createElement('div',{style:{textAlign:'center',marginBottom:36}},
      React.createElement('div',{style:{fontSize:48,marginBottom:10}},'🚐'),
      React.createElement('div',{style:{fontSize:20,fontWeight:700,color:C.text}},'¿Quién sos?'),
      React.createElement('div',{style:{fontSize:13,color:C.muted,marginTop:6}},'Seleccioná tu nombre')
    ),
    React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:12,width:'100%',maxWidth:320}},
      ...FLETEROS.map(f=>React.createElement('button',{key:f.id,onClick:()=>setFleteroId(f.id),style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:18,padding:'20px 18px',cursor:'pointer',display:'flex',alignItems:'center',gap:14,minHeight:72}},
        React.createElement('div',{style:{width:44,height:44,borderRadius:'50%',background:`${C.sky}25`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,fontWeight:700,color:C.sky}},f.avatar),
        React.createElement('div',{style:{textAlign:'left',flex:1}},React.createElement('div',{style:{fontSize:16,fontWeight:700,color:C.text}},f.nombre))
      ))
    )
  );

  return React.createElement('div',{style:A},
    verMapa&&miRuta&&React.createElement(MapaRuta,{paradas:miRuta.paradas,pedidos,fleteroId,onClose:()=>setVerMapa(false)}),
    React.createElement('div',{style:TB},
      React.createElement('div',{style:{display:'flex',alignItems:'center',gap:8}},
        React.createElement('button',{onClick:()=>setFleteroId(null),style:{background:'none',border:'none',color:C.muted,fontSize:22,cursor:'pointer'}},'‹'),
        React.createElement('div',null,
          React.createElement('div',{style:{fontSize:15,fontWeight:700,color:C.text,lineHeight:1.1}},fl?.nombre),
          React.createElement('div',{style:{fontSize:11,color:C.muted}},'FleteRuta')
        )
      ),
      React.createElement('div',{style:{display:'flex',alignItems:'center',gap:8}},
        miRuta&&React.createElement('button',{onClick:()=>setVerMapa(true),style:{padding:'6px 14px',background:`${C.sky}20`,color:C.sky,border:`1px solid ${C.sky}40`,borderRadius:10,fontSize:13,fontWeight:700,cursor:'pointer'}},'🗺 Mapa'),
        React.createElement('span',{style:BG(miRuta?`${C.accent}20`:`${C.warn}20`,miRuta?C.accent:C.warn)},miRuta?'En ruta':'Sin ruta')
      )
    ),
    React.createElement('div',{style:SC},
      !miRuta&&React.createElement('div',{style:{...CD,textAlign:'center',padding:48,marginTop:16}},
        React.createElement('div',{style:{fontSize:48,marginBottom:16}},'⏳'),
        React.createElement('div',{style:{fontSize:16,fontWeight:700,color:C.text,marginBottom:8}},'Esperando ruta'),
        React.createElement('div',{style:{fontSize:13,color:C.muted,lineHeight:1.6}},'La oficina todavía no te asignó paradas para hoy.')
      ),
      miRuta&&React.createElement(React.Fragment,null,
        React.createElement('div',{style:CD},
          React.createElement('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:14}},
            ...[[done,'Entregados',C.accent],[paradas.length-done-prob,'Pendientes',C.warn],[prob,'Problemas',C.danger]].map(([n,l,c])=>
              React.createElement('div',{key:l,style:{background:`${c}12`,border:`1px solid ${c}25`,borderRadius:10,padding:'10px 0',textAlign:'center'}},
                React.createElement('div',{style:{fontSize:22,fontWeight:700,color:c,lineHeight:1}},n),
                React.createElement('div',{style:{fontSize:10,color:C.muted,marginTop:3}},l)
              )
            )
          ),
          React.createElement('div',{style:{height:8,background:'rgba(255,255,255,0.06)',borderRadius:20,overflow:'hidden'}},
            React.createElement('div',{style:{height:'100%',width:pct+'%',background:pct===100?C.accent:C.sky,borderRadius:20,transition:'width .5s ease'}})
          ),
          React.createElement('div',{style:{fontSize:12,color:C.muted,textAlign:'right',marginTop:5}},pct+'% · '+paradas.length+' paradas')
        ),
        React.createElement('div',{style:CD},
          React.createElement('div',{style:CT},'Mis paradas'),
          ...paradas.map((par,i)=>{
            const ped=pedidos.find(p=>p.id===par.pedidoId);if(!ped)return null;
            const isCur=i===curIdx,isDone=par.status==='entregado',isProb=par.status==='problema';
            const dotC=isDone?C.accent:isProb?C.danger:isCur?C.accent:C.dim;
            return React.createElement('div',{key:par.pedidoId,style:{display:'flex',gap:10,marginBottom:8}},
              React.createElement('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',paddingTop:2}},
                React.createElement('div',{style:{width:30,height:30,borderRadius:'50%',background:`${dotC}20`,border:`2px solid ${dotC}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:dotC,flexShrink:0}},isDone?'✓':isProb?'!':i+1),
                i<paradas.length-1&&React.createElement('div',{style:{width:2,flex:1,minHeight:12,background:C.border,margin:'3px 0'}})
              ),
              React.createElement('div',{style:{flex:1,background:isCur?`${C.accent}08`:'rgba(255,255,255,0.02)',border:`1.5px solid ${isCur?C.accent:C.border}`,borderRadius:14,padding:'12px 14px',opacity:isDone?0.4:1,transition:'opacity .3s'}},
                React.createElement('div',{style:{fontSize:14,fontWeight:700,color:C.text}},ped.direccion),
                React.createElement('div',{style:{fontSize:12,color:C.muted,marginTop:3}},ped.cliente+' · '+ped.bultos+' bulto'+(ped.bultos>1?'s':'')+(ped.obs?' · '+ped.obs:'')),
                isProb&&par.nota&&React.createElement('div',{style:{fontSize:12,color:C.danger,marginTop:6,background:`${C.danger}10`,padding:'6px 10px',borderRadius:8}},'⚠ '+par.nota),
                isCur&&React.createElement('div',{style:{display:'flex',gap:8,marginTop:12,flexWrap:'wrap'}},
                  React.createElement('a',{href:'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(ped.direccion+' Córdoba Argentina'),target:'_blank',style:{flex:1,minWidth:80,padding:'10px',background:`${C.sky}20`,color:C.sky,border:`1px solid ${C.sky}40`,borderRadius:10,fontSize:13,fontWeight:700,textDecoration:'none',display:'flex',alignItems:'center',justifyContent:'center',gap:4,minHeight:44}},'📍 Navegar'),
                  React.createElement('button',{onClick:()=>markParada(par.pedidoId,'entregado'),style:{flex:1,minWidth:80,padding:'10px',background:C.accent,color:C.bg,border:'none',borderRadius:10,fontSize:13,fontWeight:700,cursor:'pointer',minHeight:44}},'✓ Entregado'),
                  React.createElement('button',{onClick:()=>{setNotaModal(par.pedidoId);setNota('');},style:{flex:1,minWidth:80,padding:'10px',background:`${C.danger}20`,color:C.danger,border:`1px solid ${C.danger}40`,borderRadius:10,fontSize:13,fontWeight:700,cursor:'pointer',minHeight:44}},'✗ Problema')
                )
              )
            );
          })
        ),
        pct===100&&React.createElement('div',{style:{...CD,textAlign:'center',padding:32,border:`1px solid ${C.accent}40`}},
          React.createElement('div',{style:{fontSize:40,marginBottom:10}},'🎉'),
          React.createElement('div',{style:{fontSize:17,fontWeight:700,color:C.accent}},'¡Ruta completada!'),
          React.createElement('div',{style:{fontSize:13,color:C.muted,marginTop:6}},'Todas las paradas procesadas.')
        )
      )
    ),
    notaModal&&React.createElement('div',{style:{position:'fixed',inset:0,background:'rgba(0,0,0,0.75)',display:'flex',alignItems:'flex-end',zIndex:100}},
      React.createElement('div',{style:{background:C.surface,borderRadius:'20px 20px 0 0',padding:'24px 20px 40px',width:'100%',border:`1px solid ${C.border}`}},
        React.createElement('div',{style:{fontSize:17,fontWeight:700,color:C.text,marginBottom:6}},'¿Qué pasó?'),
        React.createElement('div',{style:{fontSize:13,color:C.muted,marginBottom:16}},'Describí el problema para la oficina.'),
        React.createElement('textarea',{value:nota,onChange:e=>setNota(e.target.value),placeholder:'Ej: No había nadie, puerta cerrada...',style:{...IN,height:90,resize:'none',marginBottom:14}}),
        React.createElement('div',{style:{display:'flex',gap:10}},
          React.createElement('button',{onClick:()=>setNotaModal(null),style:{...BT('rgba(255,255,255,0.08)',C.muted),flex:1}},'Cancelar'),
          React.createElement('button',{onClick:()=>{markParada(notaModal,'problema',nota);setNotaModal(null);},style:{...BT(C.danger),flex:1}},'Confirmar')
        )
      )
    )
  );
}

// ── ROOT ──────────────────────────────────────────────────────────────────────
function App(){
  const [role,setRole]=useState(null);
  if(!role)return React.createElement(RoleSelector,{onSelect:setRole});
  if(role==='oficina')return React.createElement(Oficina,{onBack:()=>setRole(null)});
  return React.createElement(Fletero,{onBack:()=>setRole(null)});
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
});
